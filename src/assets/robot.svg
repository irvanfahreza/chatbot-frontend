<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Antenna -->
  <line x1="32" y1="16" x2="32" y2="8" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="32" cy="8" r="4" fill="url(#grad)"/>
  
  <!-- Head -->
  <rect x="12" y="16" width="40" height="36" rx="10" fill="#1a1b1e"/>
  
  <!-- Eyes -->
  <circle cx="24" cy="30" r="5" fill="url(#grad)"/>
  <circle cx="40" cy="30" r="5" fill="url(#grad)"/>
  
  <!-- Mouth -->
  <rect x="24" y="42" width="16" height="4" rx="2" fill="#333333"/>
</svg>
